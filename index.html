<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Survey System</title>
</head>
<body>
    <h1>LOGIN</h1>
    <form action="main.html" method="get">

        <div class="form-group">
            <label for="studentNum">Student Number:</label>
            <div>
                <input type="text" id="studentNum" name="studentNum" required placeholder="YYYY-NNNNN-XX-0" maxlength="16" pattern="^\d{4}-\d{5}-[A-Z]{2}-\d$" title="Format: YYYY-NNNNN-XX-0 . Example: 2024-09159-MN-0" autocomplete="off">
                <br>
               
            </div>
        </div>
<!--pinalitan ko yung emoji ng svg para mas maganda-->
        <div class="form-group">
            <label for="password">Password:</label>
            <div style="position: relative; display: inline-flex; align-items: center;">
                <input type="password" id="password" name="password" required minlength="8" style="padding-right: 40px;" maxlength="30" pattern="(?=.*\d)(?=.*[!@#$%^&*]).{8,}" title="Min 8 char, at least 1 number and 1 special character (!@#$%^&*)">
                <span id="togglePassword" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 22px; height: 22px;">
                 
                   <svg id="iconEyeOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12c0 0 4-8 10-8s10 8 10 8-4 8-10 8-10-8-10-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                        </svg>

                   <svg id="iconEyeHidden" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                         <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-6 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"/>
                         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"/>
                         <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                         <line x1="2" y1="2" x2="22" y2="22"/>
                    </svg>

                </span>
            </div>
        </div>

        <input type="submit" value="Login">
    </form>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const iconEyeOpen = document.getElementById('iconEyeOpen');
        const iconEyeHidden = document.getElementById('iconEyeHidden');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'password') {
                // password hidden → show open eye
                iconEyeOpen.style.display = 'block';
                iconEyeHidden.style.display = 'none';
            } else {
                // password visible → show crossed eye
                iconEyeOpen.style.display = 'none';
                iconEyeHidden.style.display = 'block';
            }
        });

        const studentNumInput = document.getElementById('studentNum');

        studentNumInput.addEventListener('input', function () {
            const cursor = this.selectionStart;
            const prevLen = this.value.length;

            let raw = this.value.replace(/[^0-9A-Za-z]/g, '').toUpperCase();
            raw = raw.substring(0, 12);

            let fmt = '';
            if (raw.length > 0)  fmt  = raw.substring(0, 4);
            if (raw.length > 4)  fmt += '-' + raw.substring(4, 9);
            if (raw.length > 9)  fmt += '-' + raw.substring(9, 11);
            if (raw.length > 11) fmt += '-' + raw.substring(11, 12);

            this.value = fmt;

            const diff = fmt.length - prevLen;
            const newCursor = Math.max(0, cursor + diff);
            this.setSelectionRange(newCursor, newCursor);
        });
    </script>
</body>
</html>
